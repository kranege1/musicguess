<!DOCTYPE html>
<html>
<head>
    <style>
        .version-footer {
            position: fixed;
            bottom: 8px;
            right: 12px;
            font-size: 0.75em;
            color: #000;
            font-weight: bold;
            pointer-events: auto;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 6px 10px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh;">
    <h1 style="color: white;">Footer Test</h1>
    
    <div class="version-footer" id="versionFooter">
        <span id="versionText">v0.0.0</span> | 
        <a href="#" onclick="alert('About clicked'); return false;" style="color: #000; text-decoration: underline; cursor: pointer;">About</a> |
        <a href="/privacy.html" target="_blank" style="color: #000; text-decoration: underline;">Privacy</a> |
        🎵 Powered by iTunes & Firebase
    </div>
    
    <script>
        // Simulate version update without breaking links
        fetch('json/version.json')
            .then(r => r.json())
            .then(data => {
                const versionText = document.getElementById('versionText');
                if (versionText) {
                    versionText.textContent = `v${data.version}`;
                }
            })
            .catch(e => console.log('Version load failed:', e));
    </script>
</body>
</html>

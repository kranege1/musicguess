<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Musik Ratespiel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        header {
            text-align: center;
            margin-bottom: 15px;
        }

        h1 {
            color: #667eea;
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #666;
            font-size: 0.95em;
        }

        /* Setup Seite */
        .setup-screen {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-weight: 600;
            color: #333;
            font-size: 0.95em;
        }

        input[type="text"],
        select {
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 0.95em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        /* Quiz Seite */
        .quiz-screen {
            display: none;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .album-cover {
            text-align: center;
            margin-bottom: 15px;
        }

        .album-cover img {
            max-width: 100%;
            max-height: 180px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .cover-placeholder {
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.5em;
            margin: 0 auto;
        }

        .player-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .play-btn {
            background: #4CAF50;
            padding: 8px 20px;
            font-size: 0.9em;
            border-radius: 25px;
        }

        .play-btn:hover {
            background: #45a049;
        }

        .play-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .stop-btn {
            background: #f44336;
            padding: 8px 20px;
            font-size: 0.9em;
            border-radius: 25px;
            display: none;
        }

        .stop-btn.active {
            display: inline-block;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #ddd;
            border-radius: 5px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.1s;
        }

        .time-display {
            text-align: center;
            color: #666;
            font-size: 0.85em;
            margin-bottom: 10px;
        }

        .questions-section {
            margin-top: 15px;
        }

        .question-title {
            text-align: center;
            color: #333;
            font-size: 1em;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .answers {
            display: grid !important;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
            min-height: 80px;
        }

        .answer-btn {
            padding: 10px !important;
            background: white !important;
            border: 2px solid #333 !important;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em !important;
            font-weight: 600 !important;
            color: #333 !important;
            transition: all 0.3s;
            text-align: center;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .answer-btn:hover {
            border-color: #667eea;
            background: #f5f5ff;
        }

        .answer-btn.correct {
            border-color: #4CAF50;
            background: #c8e6c9;
            color: #2e7d32;
            font-weight: 600;
        }

        .answer-btn.incorrect {
            border-color: #f44336;
            background: #ffcdd2;
            color: #c62828;
            font-weight: 600;
        }

        .answer-btn:disabled {
            cursor: not-allowed;
        }

        .result-message {
            text-align: center;
            font-size: 1.2em;
            font-weight: 600;
            margin: 20px 0;
            min-height: 30px;
        }

        .result-message.correct {
            color: #4CAF50;
        }

        .result-message.incorrect {
            color: #f44336;
        }

        .next-btn {
            width: 100%;
            background: #667eea;
            display: none;
        }

        .next-btn.show {
            display: block;
        }

        .song-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .song-info.show {
            display: block;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 600;
            color: #666;
        }

        .info-value {
            color: #333;
            font-weight: 500;
        }

        .game-over {
            display: none;
            text-align: center;
        }

        .game-over.show {
            display: block;
        }

        .final-score {
            font-size: 3em;
            color: #667eea;
            margin: 30px 0;
            font-weight: bold;
        }

        .score-percentage {
            font-size: 1.5em;
            color: #666;
            margin-bottom: 30px;
        }

        .emoji {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .loading {
            text-align: center;
            padding: 30px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #ffebee;
            border: 2px solid #f44336;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .answers {
                grid-template-columns: 1fr;
            }

            .stats {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎵 Musik Ratespiel</h1>
            <p class="subtitle">Erkenne das Lied und gewinne!</p>
        </header>

        <!-- Setup Screen -->
        <div class="setup-screen" id="setupScreen">
            <div class="input-group">
                <label for="gameMode">🎮 Spielmodus:</label>
                <select id="gameMode" onchange="toggleGameMode()">
                    <option value="genre">Genre auswählen (validierte Songs mit Previews)</option>
                    <option value="search">iTunes Suche</option>
                </select>
            </div>

            <div class="input-group" id="genreSelection">
                <label for="genreSelect">🎸 Genre wählen:</label>
                <select id="genreSelect">
                    <option value="Alle">Alle Genres</option>
                    <!-- Genres werden dynamisch geladen -->
                </select>
            </div>

            <div class="input-group" id="searchSelection" style="display: none;">
                <label for="searchQuery">🎤 Künstler oder Titel durchsuchen:</label>
                <input type="text" id="searchQuery" placeholder="z.B. 'Taylor Swift' oder 'Bohemian Rhapsody'">
            </div>

            <div class="input-group">
                <label for="songCount">📊 Anzahl der Songs:</label>
                <select id="songCount">
                    <option value="5">5 Songs</option>
                    <option value="10" selected>10 Songs</option>
                    <option value="15">15 Songs</option>
                    <option value="20">20 Songs</option>
                </select>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="multipleChoice" checked>
                <label for="multipleChoice">🎯 Multiple Choice Modus (4 Antworten)</label>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="genreMode">
                <label for="genreMode">🏷️ Genre als Zusatzhinweis zeigen</label>
            </div>

            <div class="input-group">
                <label for="previewDuration">⏱️ Preview-Dauer (Sekunden):</label>
                <select id="previewDuration">
                    <option value="3">3 Sekunden</option>
                    <option value="5" selected>5 Sekunden</option>
                    <option value="7">7 Sekunden</option>
                    <option value="10">10 Sekunden</option>
                </select>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <button onclick="startGame()">🚀 Spiel Starten</button>
        </div>

        <!-- Quiz Screen -->
        <div class="quiz-screen" id="quizScreen">
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="currentQuestion">1</div>
                    <div class="stat-label">Frage</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="correctCount">0</div>
                    <div class="stat-label">Richtig</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="wrongCount">0</div>
                    <div class="stat-label">Falsch</div>
                </div>
            </div>

            <div class="album-cover" id="albumCover">
                <div class="cover-placeholder">🎵</div>
            </div>

            <div class="player-controls">
                <button class="play-btn" id="playBtn" onclick="playPreview()">▶️ Preview Abspielen</button>
                <button class="stop-btn" id="stopBtn" onclick="stopPreview()">⏹️ Stopp</button>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="time-display" id="timeDisplay">0:00 / 0:30</div>

            <div class="questions-section">
                <div class="question-title">🎯 Welches Lied ist das?</div>
                <div id="loadingIndicator" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>Songs werden geladen...</p>
                </div>
                <div class="answers" id="answersContainer"></div>
                <div class="result-message" id="resultMessage"></div>
                <div class="song-info" id="songInfo">
                    <div class="info-row">
                        <span class="info-label">Künstler:</span>
                        <span class="info-value" id="infoArtist"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Titel:</span>
                        <span class="info-value" id="infoTrack"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Album:</span>
                        <span class="info-value" id="infoAlbum"></span>
                    </div>
                    <div class="info-row" id="genreRow" style="display: none;">
                        <span class="info-label">Genre:</span>
                        <span class="info-value" id="infoGenre"></span>
                    </div>
                </div>
            </div>

            <button class="next-btn" id="nextBtn" onclick="nextQuestion()">⬜ Nächste Frage</button>
            <button onclick="endGame()" style="margin-top: 15px; background: #999;">🏁 Spiel Beenden</button>
        </div>

        <!-- Game Over Screen -->
        <div class="game-over" id="gameOverScreen">
            <div class="emoji">🎉</div>
            <h2>Spiel zu Ende!</h2>
            <div class="final-score" id="finalScore">0/10</div>
            <div class="score-percentage" id="scorePercentage">0%</div>
            <button onclick="location.reload()">🔄 Neues Spiel</button>
        </div>
    </div>

    <audio id="audioPlayer"></audio>
    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Musik Ratespiel</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 6px;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 14px;
            max-width: 760px;
            width: 100%;
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.2);
        }

        header {
            text-align: center;
            margin-bottom: 10px;
        }

        h1 {
            color: #667eea;
            font-size: 1.5em;
            margin-bottom: 3px;
        }

        .subtitle {
            color: #666;
            font-size: 1.05em;
            font-weight: 500;
        }

        /* Setup Seite */
        .setup-screen {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        label {
            font-weight: 600;
            color: #333;
            font-size: 0.9em;
        }

        input[type="text"],
        select {
            padding: 7px;
            border: 2px solid #ddd;
            border-radius: 7px;
            font-size: 0.9em;
            transition: border-color 0.3s;
            width: 100%;
            max-width: 100%;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 7px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
        }

        /* Artist Bubbles Animation */
        .artist-bubbles-container {
            position: relative;
            height: 50px;
            overflow: hidden;
            background: linear-gradient(90deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
            border-radius: 10px;
            margin-top: 8px;
            display: none;
        }

        .artist-bubbles-container.active {
            display: block;
        }

        .artist-bubble {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 16px;
            border-radius: 25px;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            animation: slideLeftChain 10s linear forwards;
        }

        .artist-bubble:hover {
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        @keyframes slideLeftChain {
            from {
                transform: translateY(-50%) translateX(0);
            }
            to {
                transform: translateY(-50%) translateX(calc(-100vw - 200px));
            }
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 9px;
            border-radius: 7px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        /* Quiz Seite */
        .quiz-screen {
            display: none;
        }

        .stats {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            text-align: right;
            gap: 4px;
            margin-bottom: 12px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
        }

        .stat-total {
            font-size: 0.95em;
            font-weight: 700;
            color: #444;
        }

        .stat-line {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.95em;
            font-weight: 700;
        }

        .stat-line.success {
            color: #2e7d32;
        }

        .stat-line.error {
            color: #c62828;
        }

        .album-cover {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 8px 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .album-cover img {
            max-width: 100%;
            max-height: 160px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .album-cover.expanded {
            position: relative;
            width: 300px;
            height: 300px;
            background: transparent;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
        }

        .album-cover.expanded img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .album-cover.expanded .cover-placeholder {
            width: 300px;
            height: 300px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .cover-placeholder {
            width: 160px;
            height: 160px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.1em;
            margin: 0 auto;
        }

        .player-controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
        }

        .control-btn {
            width: 100%;
            min-width: 0;
            padding: 12px 18px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .play-wrap {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
        }

        .play-btn {
            background: #4CAF50;
            border-radius: 25px;
            width: 100%;
        }

        .reverse-btn {
            background: #555;
            border-radius: 25px;
            width: 100%;
        }

        .play-btn:hover {
            background: #45a049;
        }

        .play-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .preview-duration-selector {
            background: #f5f5f5;
            border: 2px solid #667eea;
            border-radius: 12px;
            padding: 8px;
            display: flex;
            gap: 6px;
            align-items: center;
            justify-content: space-around;
            width: 100%;
        }

        .duration-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            border: none;
            font-size: 0.9em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(76, 175, 80, 0.3);
        }

        .duration-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.5);
        }

        .duration-btn:active {
            transform: scale(0.95);
        }

        .duration-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        .stop-btn {
            background: #f44336;
            border-radius: 18px;
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            padding: 8px 12px;
            font-size: 13px;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .stop-btn.active {
            display: inline-flex;
        }

        .progress-bar {
            width: 100%;
            height: 5px;
            background: #ddd;
            border-radius: 4px;
            margin-bottom: 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.1s;
        }

        .time-display {
            text-align: center;
            color: #666;
            font-size: 0.8em;
            margin-bottom: 8px;
        }

        .questions-section {
            margin-top: 12px;
        }

        .question-title {
            text-align: center;
            color: #333;
            font-size: 0.95em;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .answers {
            display: grid !important;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
            min-height: 70px;
        }

        .answer-btn {
            padding: 9px !important;
            background: white !important;
            border: 2px solid #333 !important;
            border-radius: 9px;
            cursor: pointer;
            font-size: 0.95em !important;
            font-weight: 600 !important;
            color: #333 !important;
            transition: all 0.3s;
            text-align: center;
            min-height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .answer-btn:hover {
            border-color: #667eea;
            background: #f5f5ff;
        }

        .answer-btn.correct {
            border-color: #4CAF50;
            background: #c8e6c9;
            color: #2e7d32;
            font-weight: 600;
        }

        .answer-btn.incorrect {
            border-color: #f44336;
            background: #ffcdd2;
            color: #c62828;
            font-weight: 600;
        }

        .answer-btn:disabled {
            cursor: not-allowed;
        }

        .result-message {
            text-align: center;
            font-size: 1em;
            font-weight: 600;
            margin: 14px 0;
            min-height: 26px;
        }

        .result-message.correct {
            color: #4CAF50;
        }

        .result-message.incorrect {
            color: #f44336;
        }

        .next-btn {
            background: #667eea;
            border-radius: 25px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .song-info {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 9px;
            margin-bottom: 14px;
            display: none;
        }

        .song-info.show {
            display: block;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin: 6px 0;
            padding: 6px 0;
            border-bottom: 1px solid #ddd;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 600;
            color: #666;
            font-size: 0.9em;
        }

        .info-value {
            color: #333;
            font-weight: 500;
            font-size: 0.9em;
        }

        .game-over {
            display: none;
            text-align: center;
        }

        .game-over.show {
            display: block;
        }

        .final-score {
            font-size: 2.4em;
            color: #667eea;
            margin: 20px 0;
            font-weight: bold;
        }

        .score-percentage {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 18px;
        }

        .emoji {
            font-size: 1.6em;
            margin-bottom: 8px;
        }

        .loading {
            text-align: center;
            padding: 16px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse-highlight {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }

        .pulse-animation {
            animation: pulse-highlight 0.5s ease-out !important;
            color: #ff6b9d !important;
            text-shadow: 0 0 8px rgba(255, 107, 157, 0.8) !important;
        }

        .error-message {
            background: #ffebee;
            border: 2px solid #f44336;
            color: #c62828;
            padding: 12px;
            border-radius: 9px;
            margin: 12px 0;
            display: none;
            font-size: 0.9em;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .answers {
                grid-template-columns: 1fr;
            }

            .stats {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎵 Musik Ratespiel <span id="version" style="font-size: 0.5em; color: #888;"></span></h1>
            <p class="subtitle" id="gameSubtitle">Erkenne das Lied und gewinne!</p>
        </header>

        <!-- Setup Screen -->
        <div class="setup-screen" id="setupScreen">
            <div class="input-group">
                <label>🎮 Spielmodus:</label>
                <div style="display: flex; flex-direction: column; gap: 6px; margin-top: 6px;">
                    <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer;">
                        <input type="radio" name="gameMode" value="genre" checked onchange="toggleGameMode()">
                        <span>Genre auswählen</span>
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer;">
                        <input type="radio" name="gameMode" value="billboard" onchange="toggleGameMode()">
                        <span>Billboard Hot 100</span>
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer;">
                        <input type="radio" name="gameMode" value="search" onchange="toggleGameMode()">
                        <span>Freie Wahl (iTunes Suche)</span>
                    </label>
                </div>
            </div>

            <div class="input-group" id="genreSelection">
                <label for="genreSelect">🎸 Genre wählen:</label>
                <select id="genreSelect">
                    <option value="Alle">Alle Genres</option>
                    <!-- Genres werden dynamisch geladen -->
                </select>
            </div>

            <div class="input-group" id="billboardSelection" style="display: none;">
                <label for="yearSelect">📅 Jahr wählen:</label>
                <div style="display: flex; gap: 10px;">
                    <select id="yearSelect" style="flex: 1;" onchange="loadBillboardSongsForYear()">
                        <option value="">Jahr auswählen...</option>
                        <!-- Jahre werden dynamisch geladen -->
                    </select>
                    <select id="billboardSongInfo" style="flex: 2;" disabled>
                        <option value="">Wähle zuerst ein Jahr...</option>
                        <!-- Songs werden dynamisch geladen -->
                    </select>
                </div>
            </div>

            <div class="input-group" id="searchSelection" style="display: none;">
                <label for="searchQuery">🎤 Künstler oder Titel durchsuchen:</label>
                <input type="text" id="searchQuery" placeholder="z.B. 'Taylor Swift' oder 'Bohemian Rhapsody'">
                <!-- Artist Bubbles Container -->
                <div class="artist-bubbles-container" id="artistBubblesContainer"></div>
            </div>

            <div class="input-group">
                <label for="songCount">📊 Anzahl der Songs:</label>
                <select id="songCount">
                    <option value="5">5 Songs</option>
                    <option value="10" selected>10 Songs</option>
                    <option value="15">15 Songs</option>
                    <option value="20">20 Songs</option>
                </select>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <button onclick="startGame()">🚀 Spiel Starten</button>
        </div>

        <!-- Quiz Screen -->
        <div class="quiz-screen" id="quizScreen">
            <div class="stats">
                <div style="display: grid; grid-template-columns: 1fr auto 1fr; gap: 20px; width: 100%; align-items: start;">
                    <!-- Linke Spalte -->
                    <div style="text-align: left;">
                        <div class="stat-total" id="totalProgress">0 von 0 Fragen</div>
                        <div class="stat-line success">✅ <span id="correctCount">0</span></div>
                        <div class="stat-line error">❌ <span id="wrongCount">0</span></div>
                    </div>
                    
                    <!-- Mittlere Spalte (leer für Abstand) -->
                    <div></div>
                    
                    <!-- Rechte Spalte -->
                    <div style="text-align: right;">
                        <div class="stat-line" style="color: #667eea; justify-content: flex-end;">⏱️ <span id="totalPlayTimeDisplay">0s</span></div>
                        <div class="stat-line" style="color: #667eea; justify-content: flex-end;">🏆 <span id="pointsCount">0</span> Punkte</div>
                    </div>
                </div>
            </div>

            <div class="album-cover" id="albumCover">
                <div class="cover-placeholder"></div>
            </div>

            <div class="player-controls">
                <button onclick="endGame()" class="control-btn" style="background: #999; color: white;">🏁 Spiel Beenden</button>
                <div class="play-wrap">
                    <div class="preview-duration-selector">
                        <button class="duration-btn" onclick="playPreviewWithDuration(3)" title="3 Sekunden">3</button>
                        <button class="duration-btn" onclick="playPreviewWithDuration(5)" title="5 Sekunden">5</button>
                        <button class="duration-btn" onclick="playPreviewWithDuration(7)" title="7 Sekunden">7</button>
                        <button class="duration-btn" onclick="playPreviewWithDuration(10)" title="10 Sekunden">10</button>
                    </div>
                    <div style="display: flex; gap: 6px; width: 100%;">
                        <button class="reverse-btn control-btn" id="reverseBtn" onclick="playPreviewReverse()" style="color: white; flex: 1;">⏪ Revers</button>
                        <button class="reverse-btn control-btn" id="staccatoBtn" onclick="playPreviewStaccato()" style="color: white; flex: 1; background: #9C27B0;">🎵 Staccato</button>
                    </div>
                    <button class="stop-btn" id="stopBtn" onclick="stopPreview()">⏹️</button>
                </div>
                <button class="next-btn control-btn" id="nextBtn" onclick="nextQuestion()" style="background: #667eea; color: white;">⬜ Nächste Frage</button>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="time-display" id="timeDisplay">0:00 / 0:30</div>

            <div class="questions-section">
                <div class="question-title">🎯 Welches Lied ist das?</div>
                <div id="loadingIndicator" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>Songs werden geladen...</p>
                </div>
                <div class="answers" id="answersContainer"></div>
                <div class="result-message" id="resultMessage"></div>
                <div class="song-info" id="songInfo">
                    <div class="info-row">
                        <span class="info-label">Künstler:</span>
                        <span class="info-value" id="infoArtist"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Titel:</span>
                        <span class="info-value" id="infoTrack"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Album:</span>
                        <span class="info-value" id="infoAlbum"></span>
                    </div>
                    <div class="info-row" id="genreRow" style="display: none;">
                        <span class="info-label">Genre:</span>
                        <span class="info-value" id="infoGenre"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div class="game-over" id="gameOverScreen">
            <div class="emoji">🎉</div>
            <h2>Spiel zu Ende!</h2>
            <div class="final-score" id="finalScore">0/10</div>
            <div class="score-percentage" id="scorePercentage">0%</div>
            <div class="final-score" id="finalPoints" style="font-size: 1.8em; margin: 10px 0;">🏆 0 Punkte</div>
            <button onclick="location.reload()">🔄 Neues Spiel</button>
        </div>
    </div>

    <audio id="audioPlayer" preload="none" playsinline webkit-playsinline crossOrigin="anonymous"></audio>
    <script>
        // Force load latest version with dynamic cache buster
        const ts = Math.floor(Date.now() / 60000); // Changes every minute
        document.write('<script src="app.js?v=40&t=' + ts + '"><\/script>');
    </script>
</body>
</html>
